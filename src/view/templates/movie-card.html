<div class="col-12 col-sm-6 col-md-4 col-xl-3">
  <div class="card movie-card h-100 shadow-sm" data-movie-id="{{id}}" data-rating="0">
    <div class="card-body d-flex flex-column">
      <h6 class="card-title mb-1">{{name}}</h6>
      <div class="text-muted small mb-2">{{category}}</div>

      <p class="card-text small text-muted flex-grow-1 clamp-3">{{overview}}</p>

      <div class="d-flex align-items-center justify-content-between mt-2">
        <div class="star-rating" role="radiogroup" aria-label="Avaliação do filme">
          <button type="button" class="star" data-value="1" aria-label="1 estrela"><i class="bi bi-star"></i></button>
          <button type="button" class="star" data-value="2" aria-label="2 estrelas"><i class="bi bi-star"></i></button>
          <button type="button" class="star" data-value="3" aria-label="3 estrelas"><i class="bi bi-star"></i></button>
          <button type="button" class="star" data-value="4" aria-label="4 estrelas"><i class="bi bi-star"></i></button>
          <button type="button" class="star" data-value="5" aria-label="5 estrelas"><i class="bi bi-star"></i></button>
        </div>

        <span class="text-muted small rating-label">—</span>
      </div>

      <button class="btn btn-primary btn-sm mt-3 watch-btn" data-product='{{product}}' disabled>
        <i class="bi bi-check2"></i> Assistido
      </button>
    </div>
  </div>
</div>
