services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bitmovie_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bitmovie
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bitmovie"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
